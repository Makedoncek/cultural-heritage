{% extends "emails/base_email.html" %}
{% block content %}
<h2 style="color:#1f2937;font-size:20px;margin:0 0 16px;">Ваш об'єкт затверджено!</h2>
<p style="color:#4b5563;font-size:16px;line-height:1.5;">
    {{ user.username }}, ваш об'єкт <strong>«{{ object.title }}»</strong> пройшов модерацію та тепер доступний на карті.
</p>
<div style="text-align:center;margin:24px 0;">
    <a href="{{ object_url }}"
       style="display:inline-block;background:#d97706;color:#fff;padding:12px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:16px;">
        Переглянути на карті
    </a>
</div>
{% endblock %}
